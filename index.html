<!DOCTYPE html>

<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ассистент</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root{--accent:#7a5bff; --accent2:#00a6ff; --bg1:#06020a; --panel:rgba(255,255,255,.04); --glass:rgba(255,255,255,.06); --text:#eaf6ff;}
        *,html,body{box-sizing:border-box; margin:0; padding:0;}
        html,body{height:100%; background:linear-gradient(135deg,#070014,#001233); font-family:'Orbitron',system-ui,Arial; color:var(--text); -webkit-font-smoothing:antialiased;}
        .app{width:94%; max-width:1200px; margin:24px auto; height:88vh; position:relative; display:flex; gap:20px;}
        .chat-wrap{flex:1; display:flex; flex-direction:column; gap:12px;}
        .panel{background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)); border-radius:16px; padding:18px; border:1px solid rgba(122,91,255,.12); box-shadow: 0 8px 40px rgba(15,10,30,.6); height:100%; display:flex; flex-direction:column; backdrop-filter:blur(8px);}
        #chat{flex:1; overflow-y:auto; padding-right:8px;}
        .msg{display:flex; margin:10px 6px; opacity:1;}
        .msg.user{justify-content:flex-end;}
        .bubble{max-width:72%; padding:12px 14px; border-radius:12px; background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)); color:var(--text); box-shadow: 0 6px 18px rgba(0,0,0,.4);}
        .bubble.user{background:linear-gradient(135deg, rgba(122,91,255,.95), rgba(0,166,255,.85)); color:#021;}
        .bubble.ai{background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)); color:var(--text);}
        .input-row{display:flex; gap:10px; align-items:center; margin-top:8px;}
        .input-row input[type="text"]{flex:1; padding:12px 14px; border-radius:10px; border:none; background:rgba(255,255,255,.03); color:var(--text); outline:none;}
        .btn{padding:10px 14px; border-radius:10px; border:none; cursor:pointer; font-weight:700; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#001;}
        .btn.ghost{background:transparent; border:1px solid rgba(255,255,255,.06); color:var(--text);}
        .btn.clear{background:rgba(255,255,255,.04); color:var(--text);}
        .typing-indicator{display:inline-flex; gap:8px; align-items:center; padding:6px 10px; border-radius:10px; background:#fff3;}
        .typing-indicator .dot{width:8px; height:8px; background:#fff; border-radius:50%; opacity:.6; transform:translateY(0); animation:bounce 1.2s infinite ease-in-out;}
        @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.35} 30%{transform:translateY(-6px);opacity:1}}
    </style>
</head>
<body>
    <div class="neon-bg"><div class="neon n1"></div><div class="neon n2"></div></div>
    <div class="app">
        <div class="chat-wrap">
            <div class="panel">
                <div id="chat" aria-live="polite"></div>
                <div class="input-row" style="margin-top:12px">
                    <input id="inputText" type="text" placeholder="Напишите сообщение..." aria-label="Сообщение" />
                    <button id="sendBtn" class="btn">Отправить</button>
                    <button id="clearBtn" class="btn clear">Очистить</button>
                </div>
                <div style="margin-top:8px"><button id="downloadBtn" class="btn ghost">Скачать диалог</button><div class="small" style="margin-left:auto">Версия 1.3 — Neon</div></div>
            </div>
        </div>
    </div>
<script>
  const chatEl = document.getElementById('chat');
  const inputText = document.getElementById('inputText');
  const sendBtn = document.getElementById('sendBtn');
  const clearBtn = document.getElementById('clearBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const STORAGE_KEY = 'ai_chat_history_v3';

  function appendMessage(text, role='ai') {
      const wrap = document.createElement('div'); wrap.className = 'msg ' + role;
      const bubble = document.createElement('div'); bubble.className = 'bubble ' + (role==='user'?'user':'ai');
      bubble.textContent = text;
      wrap.appendChild(bubble);
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
      saveChat();
  }
  function saveChat(){ const rows = [...chatEl.querySelectorAll('.msg')].map(m => ({who:m.classList.contains('user')?'user':'ai', text:m.querySelector('.bubble').textContent})); localStorage.setItem(STORAGE_KEY, JSON.stringify(rows)); }
  function loadChat(){ const raw=localStorage.getItem(STORAGE_KEY); if(!raw) return; try{ const arr=JSON.parse(raw); chatEl.innerHTML=''; arr.forEach(item=>appendMessage(item.text,item.who)); }catch(e){} }
  function clearChat(){ chatEl.innerHTML=''; localStorage.removeItem(STORAGE_KEY); }
  function downloadChat(){ const rows=[...chatEl.querySelectorAll('.msg')].map(m=>`${m.classList.contains('user')?'Вы':'ИИ'}: ${m.querySelector('.bubble').textContent}`).join('\n'); const blob=new Blob([rows],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='dialog.txt'; a.click(); }

  // --- НАСТРОЙКА ПОДКЛЮЧЕНИЯ К ROUTERAI ---
  const API_URL = 'https://routerai.ru/api/v1/chat/completions';
  const MODEL_NAME = 'openai/gpt-4o-mini';
  
  // ⚠️ ВАЖНО ⚠️ ЗАМЕНИТЕ ЭТУ СТРОЧКУ СВОИМ КЛЮЧОМ ⚠️
  const API_KEY = 'sk-H70HtpUzQy4lDD3iqlNk5zCjJMOO0EJa'; 

  let isSending = false;

  function showTyping(){ const t=document.createElement('div'); t.className='msg ai'; t.id='typingBubble'; t.innerHTML=`<div class="bubble ai"><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`; chatEl.appendChild(t); chatEl.scrollTop=chatEl.scrollHeight; }
  function removeTyping(){ const t=document.getElementById('typingBubble'); if(t) t.remove(); }

  async function sendMessageToRouterAI(userText) {
      showTyping();
      try {
          const response = await fetch(API_URL, {
              method: 'POST',
              headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_KEY},
              body: JSON.stringify({model: MODEL_NAME, messages:[{role:"user", content:userText}], temperature:.7})
          });
          const data = await response.json();
          removeTyping();
          const answer = data.choices[0].message.content;
          appendMessage(answer,'ai');
      } catch (err) { removeTyping(); appendMessage('Ошибка сервера','ai'); console.error(err); }
  }

  async function sendMessage() {
      if(isSending) return;
      const text = inputText.value.trim();
      if(!text) return;
      isSending = true;
      appendMessage(text,'user');
      inputText.value = '';
      await sendMessageToRouterAI(text);
  }

  sendBtn.onclick = sendMessage;
  inputText.addEventListener('keydown', e => { if(e.key==='Enter') sendBtn.click(); });
  clearBtn.onclick = clearChat;
  downloadBtn.onclick = downloadChat;
  window.addEventListener('load', loadChat);
</script>
</body>
</html>
