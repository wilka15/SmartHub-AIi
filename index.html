<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ассистент</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent:#7a5bff; --accent2:#00a6ff; --bg1:#06020a; --panel: rgba(255,255,255,0.04);
            --glass: rgba(255,255,255,0.06); --text:#eaf6ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: linear-gradient(135deg,#070014,#001233); font-family: 'Orbitron', system-ui, Arial; color: var(--text); -webkit-font-smoothing: antialiased; }
        .app { width: 94%; max-width: 1200px; margin: 24px auto; height: 88vh; position: relative; display: flex; gap: 20px; }
        .chat-wrap { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .panel {
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            border-radius: 16px; padding: 18px; border: 1px solid rgba(122,91,255,0.12);
            box-shadow: 0 8px 40px rgba(15,10,30,0.6); height: 100%; display: flex; flex-direction: column;
            backdrop-filter: blur(8px);
        }
        #chat { flex: 1; overflow-y: auto; padding-right: 8px; }
        .msg { display: flex; margin: 10px 6px; opacity: 1; }
        .msg.user { justify-content: flex-end; }
        .bubble {
            max-width: 72%; padding: 12px 14px; border-radius: 12px;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)); color: var(--text);
            box-shadow: 0 6px 18px rgba(0,0,0,0.4);
        }
        .bubble.user { background: linear-gradient(135deg, rgba(122,91,255,0.95), rgba(0,166,255,0.85)); color: #021; }
        .bubble.ai { background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); color: var(--text); }
        .input-row { display: flex; gap: 10px; align-items: center; margin-top: 8px; }
        .input-row input[type="text"] { flex: 1; padding: 12px 14px; border-radius: 10px; border: none; background: rgba(255,255,255,0.03); color: var(--text); outline: none; }
        .btn { padding: 10px 14px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; background: linear-gradient(135deg,var(--accent),var(--accent2)); color:#001; }
        .btn.ghost { background: transparent; border: 1px solid rgba(255,255,255,0.06); color: var(--text); }
        .btn.clear { background: rgba(255,255,255,0.04); color: var(--text); }
        .typing-indicator { display:inline-flex; gap:8px; align-items:center; padding:6px 10px; border-radius:10px; background: rgba(255,255,255,0.02); }
        .typing-indicator .dot { width:8px; height:8px; background:#fff; border-radius:50%; opacity:.6; transform: translateY(0); animation:bounce 1.2s infinite ease-in-out; box-shadow: 0 0 10px rgba(122,91,255,.28); }
        .typing-indicator .dot:nth-child(1){ animation-delay:.0s; }
        .typing-indicator .dot:nth-child(2){ animation-delay:.12s; }
        .typing-indicator .dot:nth-child(3){ animation-delay:.24s; }
        @keyframes bounce { 0%{transform:translateY(0);opacity:.35} 30%{transform:translateY(-6px);opacity:1} 60%{transform:translateY(0);opacity:.35} 100%{transform:translateY(0);opacity:.35} }
        @keyframes slideInRight { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }
        @keyframes slideInLeft { from{transform:translateX(-40px);opacity:0} to{transform:translateX(0);opacity:1} }
        .msg.user .bubble{animation:slideInRight .32s cubic-bezier(.22,.9,.24,1)}
        .msg.ai .bubble{animation:slideInLeft .32s cubic-bezier(.22,.9,.24,1)}
        .neon-bg{position:fixed;inset:0;z-index:-1;pointer-events:none}
        .neon { position:absolute;width:600px;height:600px;filter:blur(90px);mix-blend-mode:screen;border-radius:50% }
        .n1{left:-160px;top:-160px;background:radial-gradient(circle,#7a5bff,transparent 47%)}
        .n2{right:-180px;bottom:-60px;background:radial-gradient(circle,#ff7a7a,transparent 47%)}
        .n3{left:-8%;top:-38%;background:#fff3;background-size:cover}

        .menu-toggle{position:fixed;right:24px;top:-8px;z-index:60;}

        .slide-menu{position:fixed;right:-360px;top:-8px;height:max-content;width:max-content;
            max-width:max-content;
            min-width:max-content;
            max-height:max-content;
            min-height:max-content;
            overflow-y:max-content;
            transition:.36s cubic-bezier(.2,.9,.2,1);border-left:none;}

         .slide-menu.open{right:-36px;}

         .menu-inner{height:max-content;
             max-height:max-content;
             min-height:max-content;
             background:#fff3;
             backdrop-filter:none;
             padding-top:max-content;
             max-width:max-content;
             min-width:max-content;
             display:none;}

         .menu-inner h3{margin-top:max-content;}

         @media (max-width:968px){ 
           .slide-menu.open{width:max-content;}
           .menu-inner{padding-top:max-content;}
           .app{margin-top:max-content;}
         }
    </style>
</head>
<body>
    <div class="neon-bg">
        <div class="neon n1"></div>
        <div class="neon n2"></div>
    </div>
    <div class="app">
        <div class="chat-wrap">
            <div class="panel">
                <div id="chat" aria-live="polite"></div>
                <div class="input-row" style="margin-top:12px">
                    <input id="inputText" type="text" placeholder="Напишите сообщение..." aria-label="Сообщение" />
                    <button id="sendBtn" class="btn">Отправить</button>
                    <button id="clearBtn" class="btn clear">Очистить</button>
                </div>
                <div style="margin-top:8px">
                    <button id="downloadBtn" class="btn ghost">Скачать диалог</button>
                    <div class="small" style="margin-left:auto">Версия 1.3 — Neon</div>
                </div>
            </div>
        </div>
    </div>

    <button class="menu-toggle" id="menuToggle">☰</button>

    <script>
      const chatEl = document.getElementById('chat');
      const inputText = document.getElementById('inputText');
      const sendBtn = document.getElementById('sendBtn');
      const clearBtn = document.getElementById('clearBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const menuToggle = document.getElementById('menuToggle');

      const STORAGE_KEY = 'ai_chat_history_v3';

      function appendMessage(text, role='ai') {
          const wrap = document.createElement('div');
          wrap.className = 'msg ' + role;
          const bubble = document.createElement('div');
          bubble.className = 'bubble ' + (role==='user'?'user':'ai');
          bubble.textContent = text;
          wrap.appendChild(bubble);
          chatEl.appendChild(wrap);
          chatEl.scrollTop = chatEl.scrollHeight;
          saveChat();
      }

      function saveChat() {
          const rows = [...chatEl.querySelectorAll('.msg')].map(m => {
              const who = m.classList.contains('user') ? 'user' : 'ai';
              const txt = m.querySelector('.bubble')?.textContent || '';
              return {who, text: txt};
          });
          localStorage.setItem(STORAGE_KEY, JSON.stringify(rows));
      }

      function loadChat() {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          try {
              const arr = JSON.parse(raw);
              chatEl.innerHTML = '';
              arr.forEach(item => appendMessage(item.text, item.who));
          } catch(e){}
      }

      function clearChat() {
          chatEl.innerHTML = '';
          localStorage.removeItem(STORAGE_KEY);
      }

      function downloadChat() {
          const rows = [...chatEl.querySelectorAll('.msg')].map(m => {
              const who = m.classList.contains('user') ? 'Вы' : 'ИИ';
              const txt = m.querySelector('.bubble')?.textContent || '';
              return `${who}: ${txt}`;
          }).join('\n');
          const blob = new Blob([rows], {type:'text/plain'});
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'dialog.txt';
          a.click();
      }

      sendBtn.onclick = () => {
          const text = inputText.value.trim();
          if (!text) return;
          appendMessage(text, 'user');
          inputText.value = '';

          // ИМИТАЦИЯ ОТВЕТА ИИ (замените на реальный API)
          setTimeout(() => appendMessage('Привет! Это неросеть "SmartHub-AI.', 'ai'), 800);
      };

      inputText.addEventListener('keydown', e => { if (e.key === 'Enter') sendBtn.click(); });
      clearBtn.onclick = clearChat;
      downloadBtn.onclick = downloadChat;
      menuToggle.onclick = () => alert('Меню пока не реализовано.');

      window.addEventListener('load', loadChat);
    </script>
</body>
</html>
